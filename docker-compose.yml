# Docker Compose for local development
# Industry standard: Multi-service orchestration with networking

version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: apcan-postgres
    environment:
      POSTGRES_USER: apcan_user
      POSTGRES_PASSWORD: apcan_password_dev
      POSTGRES_DB: apcan_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apcan_user -d apcan_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - apcan-network

  # Redis for session state
  redis:
    image: redis:7-alpine
    container_name: apcan-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - apcan-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apcan-backend
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://apcan_user:apcan_password_dev@postgres:5432/apcan_dev
      DB_ECHO: "false"

      # Redis
      REDIS_URL: redis://redis:6379/0

      # Security (CHANGE IN PRODUCTION!)
      SECRET_KEY: dev_secret_key_min_32_chars_change_in_production

      # API
      ENVIRONMENT: development
      DEBUG: "true"
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173

      # Google APIs (add your keys in .env)
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

      # Logging
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - apcan-network
    volumes:
      # Mount for hot-reload in development
      - ./backend/app:/app/app:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/liveness').read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # pgAdmin for database management (optional, development only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: apcan-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@apcan.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - apcan-network
    profiles:
      - dev-tools # Only start with: docker-compose --profile dev-tools up

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  apcan-network:
    driver: bridge
