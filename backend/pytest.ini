[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts = 
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short

# Coverage
[coverage:run]
source = app
omit = 
    */tests/*
    */conftest.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Async support
asyncio_mode = auto
